{% extends "base.html" %}
{% block content %}

<div class="page-wrapper">

    <div class="progress-container">
        <div class="step completed">✓</div>
        <div class="step completed">✓</div>
        <div class="step active">3</div>
        <div class="step">4</div>
    </div>

    <div class="progress-bar">
        <div class="progress-fill" style="width: 75%;"></div>
    </div>

    <div class="profile-card">

        <h2>Quick Assessment</h2>

        <form method="POST">

            <p><strong>1. What is 2 + 2?</strong></p>
            <input type="radio" name="q1" value="3"> 3<br>
            <input type="radio" name="q1" value="4"> 4<br>
            <input type="radio" name="q1" value="5"> 5<br><br>

            <p><strong>2. Solve: 2x = 16</strong></p>
            <input type="radio" name="q2" value="6"> 6<br>
            <input type="radio" name="q2" value="8"> 8<br>
            <input type="radio" name="q2" value="10"> 10<br><br>

            <div class="button-row">
                <a href="/subjects" class="btn-secondary">← Back</a>
                <button type="submit" class="btn-primary">Submit Assessment →</button>
            </div>

        </form>
    </div>

</div>

{% endblock %}
